openapi: "3.0.3"
info:
  title: Single Rule Test Fixture
  version: "1.0.0"
  description: >
    Intentional grammar-boundary test fixture (FR-015).
    All operations deliberately omit the `description` field so that grading
    produces violations exclusively from the `operation-description` rule
    (category: `operation`). This exercises the singular-form grammar paths
    in recommendations: "Focus on this rule" and "Start with this category".
  contact:
    name: Test
    email: test@example.com
servers:
  - url: https://api.example.com/v1
    description: Production
tags:
  - name: widgets
    description: Widget operations
paths:
  /widgets:
    get:
      operationId: listWidgets
      summary: List all widgets
      tags: [widgets]
      responses:
        "200":
          description: A list of widgets
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      operationId: createWidget
      summary: Create a widget
      tags: [widgets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Widget created
  /widgets/{id}:
    get:
      operationId: getWidget
      summary: Get a widget by ID
      tags: [widgets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single widget
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Not found
    put:
      operationId: updateWidget
      summary: Update a widget
      tags: [widgets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Widget updated
