swagger: "2.0"
info:
  title: Pet Store
  version: "1.0"
host: petstore.example.com
basePath: /v1
schemes:
  - https
paths:
  /pets:
    get:
      summary: List pets
      operationId: listPets
      produces:
        - application/json
      parameters: []
      responses:
        "200":
          description: A list of pets
          schema:
            type: array
            items:
              $ref: "#/definitions/Pet"
definitions:
  Pet:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
