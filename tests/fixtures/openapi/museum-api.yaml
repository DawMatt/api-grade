openapi: 3.1.0
info:
  title: Museum API
  description: An API for managing a museum's exhibits and visitor information.
  version: 1.0.0
  contact:
    name: Museum Support
    email: support@example-museum.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://api.example-museum.com/v1
    description: Production server

tags:
  - name: exhibits
    description: Museum exhibit management
  - name: tickets
    description: Visitor ticket operations

paths:
  /exhibits:
    get:
      operationId: listExhibits
      summary: List all exhibits
      description: Returns a paginated list of all museum exhibits.
      tags:
        - exhibits
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of results per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A list of exhibits
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Exhibit'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
              example:
                data:
                  - id: "123e4567-e89b-12d3-a456-426614174000"
                    name: "Ancient Egypt"
                    description: "Journey through the world of ancient Egypt"
                    location: "Wing A, Level 1"
                meta:
                  page: 1
                  limit: 20
                  total: 42
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /exhibits/{exhibitId}:
    get:
      operationId: getExhibit
      summary: Get an exhibit by ID
      description: Returns details for a specific museum exhibit.
      tags:
        - exhibits
      parameters:
        - name: exhibitId
          in: path
          required: true
          description: Unique identifier for the exhibit
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Exhibit details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exhibit'
              example:
                id: "123e4567-e89b-12d3-a456-426614174000"
                name: "Ancient Egypt"
                description: "Journey through the world of ancient Egypt"
                location: "Wing A, Level 1"
        '404':
          description: Exhibit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tickets:
    post:
      operationId: purchaseTicket
      summary: Purchase a museum ticket
      description: Purchase one or more tickets for museum entry.
      tags:
        - tickets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketRequest'
            example:
              visitorName: "Jane Smith"
              visitDate: "2025-06-15"
              ticketType: "adult"
              quantity: 2
      responses:
        '201':
          description: Ticket purchased successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Exhibit:
      type: object
      required:
        - id
        - name
        - location
      properties:
        id:
          type: string
          format: uuid
          description: Unique exhibit identifier
        name:
          type: string
          description: Display name of the exhibit
          example: "Ancient Egypt"
        description:
          type: string
          description: Detailed description of the exhibit
        location:
          type: string
          description: Physical location within the museum
          example: "Wing A, Level 1"

    TicketRequest:
      type: object
      required:
        - visitorName
        - visitDate
        - ticketType
      properties:
        visitorName:
          type: string
          description: Name of the visitor
        visitDate:
          type: string
          format: date
          description: Planned date of visit
        ticketType:
          type: string
          enum: [adult, child, senior, student]
          description: Type of ticket
        quantity:
          type: integer
          minimum: 1
          maximum: 10
          default: 1
          description: Number of tickets to purchase

    Ticket:
      type: object
      required:
        - ticketId
        - visitorName
        - visitDate
        - ticketType
      properties:
        ticketId:
          type: string
          format: uuid
          description: Unique ticket identifier
        visitorName:
          type: string
        visitDate:
          type: string
          format: date
        ticketType:
          type: string
          enum: [adult, child, senior, student]
        quantity:
          type: integer

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message
